name: Daily News Update

on:
  schedule:
    # 00:30 UTC = 台灣時間 08:30（GitHub cron 為 UTC，尖峰時段可能延遲數分鐘）
    - cron: "30 0 * * *"
  workflow_dispatch: {} # 允許在 Actions 頁手動觸發測試

permissions:
  contents: write # 讓 workflow 能把更新後的 JSON commit 回 repo

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news & generate insights
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "沒有變更，略過 commit。"
          else
            git commit -m "chore: 每日時事更新 $(date -u +'%Y-%m-%d')"
            git push
          fi
