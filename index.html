<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日時事統整｜金融・AI科技・投資</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <!-- 背景光暈層（純裝飾，科技未來感） -->
  <div class="bg-glow" aria-hidden="true">
    <span class="glow glow-cyan"></span>
    <span class="glow glow-purple"></span>
    <span class="grid-overlay"></span>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,20 11,12 17,18 29,6" />
            <polyline points="22,6 29,6 29,13" />
          </svg>
        </span>
        <div class="brand-text">
          <h1>每日時事統整</h1>
          <p class="tagline">金融 · AI科技 · 投資　｜　國際 · 台灣</p>
        </div>
      </div>
      <div class="updated" id="updated">載入中…</div>
    </div>

    <div class="controls">
      <label>
        分類
        <select id="filter-category">
          <option value="all">全部</option>
          <option value="finance">金融</option>
          <option value="ai">AI科技</option>
          <option value="investment">投資</option>
        </select>
      </label>

      <label>
        地區
        <select id="filter-region">
          <option value="all">全部</option>
          <option value="international">國際</option>
          <option value="taiwan">台灣</option>
        </select>
      </label>

      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" data-view="all">全部時事</button>
        <button class="toggle-btn" data-view="bookmarks">★ 我的收藏 <span id="bm-count">0</span></button>
      </div>
    </div>
    <span class="header-line" aria-hidden="true"></span>
  </header>

  <main id="news-list" class="news-list">
    <!-- 卡片由 app.js 渲染 -->
  </main>

  <p class="empty" id="empty-state" hidden>目前沒有符合條件的時事。</p>

  <footer class="site-footer">
    <p>內容由 RSS 來源彙整、Gemini 生成摘要與洞察。每則皆附原文連結，請以原始來源為準。</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
